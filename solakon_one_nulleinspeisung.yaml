blueprint:
  name: Solakon ONE Nulleinspeisung (DE) - Dynamisch & SOC-Gesteuert (V207)
  description: |
    ### Dynamische Nulleinspeisung mit SOC-Zonenlogik
      Dieser Home Assistant Blueprint implementiert eine dynamische Nulleinspeisung für den Solakon ONE Wechselrichter.
      Er nutzt einen PI-Regler (Proportional-Integral-Regler) zur präzisen Steuerung der AC-Ausgangsleistung und eine dreistufige State-of-Charge (SOC)-Logik zur effizienten Verwaltung des Batteriespeichers.
      Ziel dieses Blueprints ist es PV-Energie direkt auszugeben ohne den Umweg über die Batterie, dies verhindert das "flackern" das die App mit ihrer (lade ein Prozent -> entlade ein Prozent -> repeat) Funktionsweise verursacht und soll die Batterie schonen.
    
    ---
    
    ### 🧠 PI-Regler & Steuerlogik
    Der Kern des Blueprints ist ein PI-Regler (Proportional-Integral-Regler), der das AC-Output-Limit (Entladeleistung) dynamisch anpasst.
    * **Messprinzip:** Die Regelung basiert auf dem Shelly/Netzleistungssensor. **WICHTIG:** Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
    * **P-Anteil (Proportional):** Reagiert auf die aktuelle Abweichung mit konfigurierbarer Aggressivität (Regelungs-Faktor).
    * **I-Anteil (Integral):** Summiert Abweichungen über die Zeit auf und eliminiert bleibende Regelabweichungen. Wird bei Zonenwechseln zurückgesetzt (Anti-Windup).
    
    ---
    
    ### 🔋 Dreistufige SOC-Zonenlogik
    Die Logik unterteilt den Batterieladestand (SOC) in drei Zonen:
    
    #### 1. Zone: Aggressive Regelung (Entladezyklus / Hoher SOC)
    * **Bedingung:** SOC > Oberer Schwellenwert (`soc_fast_limit`) ODER Entladezyklus aktiv.
    * **Aktion:** Max. Entladestrom wird auf den Standardwert (z.B. 40 A) gesetzt.
    * **Regelung:** PI-Regler mit Nullpunkt-Offset (z.B. 30 W) zur Verschiebung des Regelziels hin zu leichtem Netzbezug oder exacter Nulleinspeisung.
    * **Verhalten:** Einmal aktiviert, läuft Zone 1 bis SOC ≤ 20% fällt (kein Yo-Yo-Effekt).
    
    #### 2. Zone: Batterieschonende Regelung (Zwischen-SOC)
    * **Bedingung:** SOC zwischen Unterer (`soc_conservation_limit`) und Oberer Schwelle, UND Entladezyklus inaktiv.
    * **Aktion:** Max. Entladestrom wird auf 0 A gesetzt, kein Einfluss auf Batterieheizung, begrenzt die Ausgangsleistung der Solakon sicherer auf die PV-Leistung.
    * **Regelung:** PI-Regler mit Nullpunkt-Offset (z.B. 30 W) zur Verschiebung des Regelziels hin zu leichtem Netzbezug oder exacter Nulleinspeisung.
    * **Dynamische Obergrenze:** Entladeleistung wird durch Max(0, PV - Reserve) gedeckelt.
    * **Nachtabschaltung:** Optional kann Zone 2 bei PV < Schwelle deaktiviert werden (Zone 1 bleibt aktiv).
    
    #### 3. Zone: Sicherheits-Stopp (Niedriger SOC)
    * **Bedingung:** SOC fällt auf oder unter den Unteren Schwellenwert.
    * **Aktion:** Sofortiges Umschalten auf "Disabled" und Setzen des AC-Output-Limits auf 0 W.
    
  domain: automation
  source_url: https://github.com/D4nte85/Solakon-One-Nulleinspeisung-Blueprint-homeassistant/edit/main/solakon_one_nulleinspeisung.yaml
  input:
      
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      netz_entitäten:
        name: "🔌 NETZ-SENSOR (Extern - z.B. Shelly 3EM):"
        description: "Hier findest du den notwendigen Netzverbrauchssensor."
        collapsed: true 
        input:    
          grid_power_sensor:
            name: 🔌 Shelly/Netz-Leistungssensor (ERFORDERLICH)
            description: |
              Sensor für die aktuelle Netzleistung (z.B. Shelly 3EM).
              ⚠️ WICHTIG: Positive Werte = Bezug, NEGATIVE WERTE = Einspeisung.
            selector:
              entity:
                domain: sensor
                device_class: power
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚡ SOLAKON ONE - ENTITÄTEN
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      solakon_entitäten:
        name: "⚡ SOLAKON ONE - ENTITÄTEN:"
        description: "Hier findest du die notwendigen Solakon One Entitäten mit ausgewählten Standarts."
        collapsed: true 
        input:    
          solar_power_sensor:
            name: ☀️ Solakon ONE - Solarleistung (PV-Erzeugung)
            description: Die aktuelle PV-Gesamterzeugung in Watt.
            default: sensor.solakon_one_pv_leistung
            selector:
              entity:
                domain: sensor
                device_class: power
        
          soc_sensor:
            name: 🔋 Solakon ONE - Batterieladestand (SOC)
            description: Der aktuelle Batterieladestand in %.
            default: sensor.solakon_one_batterie_ladestand
            selector:
              entity:
                domain: sensor
                device_class: battery
        
          remote_timeout_countdown_sensor:
            name: ⏱️ Solakon ONE - Remote Timeout Countdown
            description: Sensor, der den verbleibenden Timeout-Countdown anzeigt.
            default: sensor.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: sensor
        
          active_power_number:
            name: ⚙️ Solakon ONE - Ausgangsleistungsregler
            description: Die Entität zum Setzen des Leistungs-Sollwerts (Remote Active Power).
            default: number.solakon_one_fernsteuerung_leistung
            selector:
              entity:
                domain: number
        
          max_discharge_current_number:
            name: 🔋 Solakon ONE - Max. Entladestrom
            description: Die Entität zur Steuerung des maximalen Entladestroms (A).
            default: number.solakon_one_maximaler_entladestrom
            selector:
              entity:
                domain: number
        
          remote_timeout_set_number:
            name: ⏲️ Solakon ONE - Modus-Reset-Timer
            description: Dient zum Setzen/Zurücksetzen des Remote-Timeouts (max. 3599 s).
            default: number.solakon_one_fernsteuerung_zeituberschreitung
            selector:
              entity:
                domain: number
        
          mode_select:
            name: 🔄 Solakon ONE - Betriebsmodus-Auswahl
            description: Die Entität zum Umschalten des Betriebsmodus (Remote Control Mode).
            default: select.solakon_one_modus_fernsteuern
            selector:
              entity:
                domain: select
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      homeassistant_helper:
        name: "🛠️ HOME ASSISTANT HELPER (ERFORDERLICH!):"
        description: "Hier findest du die notwendigen Helfer die du anlegen MUSST damit dieser Blueprint richtig funktioniert."
        collapsed: true 
        input:     
          cycle_active_input_select:
            name: 🛠️ Entladezyklus-Zustandsspeicher (input_select - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen Input Select Helfer mit den Optionen 'on' und 'off'.
              Settings → Devices & Services → Helpers → Create Helper → Dropdown
              - Name: z.B. 'SOC Entladezyklus Status'
              - Options: 'on' und 'off' (exakt so!)
            
              Dieser speichert, ob der Entladezyklus aktiv ist (Zone 1).
            default: input_select.soc_entladezyklus_status
            selector:
              entity:
                domain: input_select
        
          integral_helper:
            name: 🛠️ Integral-Speicher (input_number - ERFORDERLICH!)
            description: |
              ⚠️ WICHTIG: Erstellen Sie einen input_number Helper für den PI-Regler:
              Settings → Devices & Services → Helpers → Create Helper → Number
              - Name: z.B. 'Solakon Integral'
              - Min: -1000
              - Max: 1000
              - Step: 1
              - Initial: 0
            
              Dieser speichert den I-Anteil des PI-Reglers.
            default: input_number.solakon_integral
            selector:
              entity:
                domain: input_number
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🎚️ REGELUNGS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      PI_parameter:
        name: "🎚️ REGELUNGS-PARAMETER (PI):"
        description: "Hier findest du die Parameter für die PI-regelung, diese solltest du nicht anfassen müssen, aber du kannst."
        collapsed: true 
        input:    
          regulator_factor:
            name: 🎛️ P-Faktor (Proportional-Verstärkung)
            description: |
              P-Anteil des PI-Reglers: Reagiert auf aktuelle Abweichung (z.B. 1.5).
              Höher = schnellere, aggressivere Reaktion | Niedriger = sanftere Reaktion
            default: 1.5
            selector:
              number:
                min: 0.1
                max: 5
                step: 0.1
        
          ki_factor:
            name: 🎛️ I-Faktor (Integral-Verstärkung)
            description: |
              I-Anteil des PI-Reglers: Eliminiert bleibende Abweichungen (z.B. 0.05).
              Höher = schnellere Korrektur, aber instabiler | Niedriger = langsamer, stabiler
            default: 0.05
            selector:
              number:
                min: 0.01
                max: 0.2
                step: 0.01
     
          tolerance:
            name: 📏 Toleranzbereich (Totband)
            description: |
              Bereich in Watt um den Nullpunkt, in dem KEINE Korrektur stattfindet (z.B. ±25 W).
              Verhindert permanente Mini-Korrekturen bei stabiler Regelung.
            default: 25
            selector:
              number:
                min: 0
                max: 200
                unit_of_measurement: W
        
          wait_time:
            name: ⏱️ Wartezeit nach setzen des Ausgangs
            description: |
              Verzögerung (in Sekunden) nach dem Setzen der Ausgangsleistung
              Verhindert zu schnelle aufeinanderfolgende Anpassungen und gibt dem Wechselrichter sowie den Sensoren (Netz und Solakon) Zeit, die neuen Werte zu verarbeiten und zu aktualisieren.
              ⚠️ WICHTIG: modbus-update-einstellungen beachten!
            default: 3
            selector:
              number:
                min: 0
                max: 30
                step: 1
                unit_of_measurement: s
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔋 SOC-ZONEN-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      soc_parameter:
        name: "🔋 SOC-ZONEN-PARAMETER:"
        description: "Hier findest du die Parameter für die SOC-Zonensteuerung."
        collapsed: true 
        input:    
          soc_fast_limit:
            name: 🔋 SOC-Schwelle "Zone 1 Start" (Aggressive Entladung)
            description: |
              Obere Schwelle (z.B. 50 %).
              Überschreiten aktiviert Zone 1 (aggressive Entladung mit 40A).
              Zone 1 läuft dann bis SOC ≤ 20% fällt (kein Yo-Yo-Effekt).
            default: 50
            selector:
              number:
                min: 1
                max: 99
                unit_of_measurement: "%"
        
          soc_conservation_limit:
            name: 🔋 SOC-Schwelle "Zone 3 Stopp" (Sicherheits-Grenze)
            description: |
              Untere Schwelle (z.B. 20 %).
              Unterschreiten stoppt die Entladung komplett (Zone 3 = Disabled).
            default: 20
            selector:
              number:
                min: 1
                max: 49
                unit_of_measurement: "%"
        
          default_discharge_current:
            name: 🔋 Max. Entladestrom in Zone 1 (Ampere)
            description: |
              Maximaler Entladestrom in Zone 1 (aggressive Entladung, z.B. 40 A).
              In Zone 2 wird automatisch 0 A gesetzt (batterieschonend).
            default: 40
            selector:
              number:
                min: 0
                max: 40
                unit_of_measurement: A
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # ⚙️ ZONE 1/2 - PARAMETER/OFFSETS
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      zone_parameter:
        name: "⚙️ ZONE 1/2 - PARAMETER/OFFSETS:"
        description: "Hier findest du die Parameter für die SOC-Zonensteuerung. Der Offset kann statisch oder dynamisch (über eine input_number Entität) konfiguriert werden."
        collapsed: true
        input:   
          offset_1:
            name: ⚙️ Zone 1 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 1 (z.B. 30 W).
              Wird verwendet, wenn KEINE dynamische Offset-Entität konfiguriert ist.
              Positiver Wert = leichter Netzbezug erwünscht.
              0 W = Exakte Nulleinspeisung.
            default: 30
            selector:
              number:
                min: 0
                max: 100
                unit_of_measurement: W

          offset_1_entity:
            name: ⚙️ Zone 1 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 1.
              Wenn konfiguriert, wird der Wert dieser Entität anstelle des statischen Offsets verwendet.
              So kann der Offset z.B. per Automatisierung angepasst werden
              (z.B. Offset erhöhen wenn der Fernseher läuft).
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          offset_2:
            name: ⚙️ Zone 2 - Nullpunkt-Offset Statisch (Fallback)
            description: |
              Statischer Zielwert für Netzleistung in Zone 2 (z.B. 30 W).
              Wird verwendet, wenn KEINE dynamische Offset-Entität konfiguriert ist.
              Positiver Wert = leichter Netzbezug erwünscht.
              0 W = Exakte Nulleinspeisung.
            default: 30
            selector:
              number:
                min: 0
                max: 100
                unit_of_measurement: W

          offset_2_entity:
            name: ⚙️ Zone 2 - Dynamischer Nullpunkt-Offset (Optional)
            description: |
              Optionale input_number Entität für den dynamischen Offset in Zone 2.
              Wenn konfiguriert, wird der Wert dieser Entität anstelle des statischen Offsets verwendet.
              So kann der Offset z.B. per Automatisierung angepasst werden
              (z.B. Offset erhöhen wenn der Fernseher läuft).
              ⚠️ Wenn leer gelassen, wird der statische Wert oben verwendet.
            default: {}
            selector:
              entity:
                domain: input_number

          pv_charge_reserve:
            name: ⚙️ Zone 2 - PV-Ladereserve
            description: |
              PV-Leistung, die in Zone 2 für Ladung reserviert wird (z.B. 50 W).
              Dynamische Obergrenze: Max. Entladung = PV - Reserve.
              Stellt sicher, dass Batterie auch bei Trickle-Charge geladen wird.
            default: 50
            selector:
              number:
                min: 0
                max: 1000
                unit_of_measurement: W
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🔒 SICHERHEITS-PARAMETER
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      safety_parameter:
        name: "🔒 SICHERHEITS-PARAMETER:"
        description: "Hier findest du den Parameter für die max Ausgangsleistung."
        collapsed: true 
        input:     
          max_active_power_limit:
            name: 🔒 Maximale Ausgangsleistung (Hard Limit)
            description: |
              Absolute Obergrenze der AC-Ausgangsleistung (z.B. 800 W).
              Schützt vor Überlastung des Wechselrichters.
            default: 800
            selector:
              number:
                min: 0
                max: 1200
                unit_of_measurement: W
        
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
        # 🌙 NACHTABSCHALTUNG (Optional)
        # ═══════════════════════════════════════════════════════════════════════════════════════════════
      night_parameter:
        name: "🌙 NACHTABSCHALTUNG (Optional):"
        description: "Hier findest du die Parameter für die optionale Nachtabschaltung (atm wenig effektive Änderung/Platzhalter für mögliches zukünftiges Abschalten des Inverters)."
        collapsed: true 
        input:    
          night_shutdown_enabled:
            name: 🌙 Nachtabschaltung aktivieren
            description: |
              Deaktiviert Zone 2 nachts automatisch (bei PV < Schwelle).
              ⚠️ Zone 1 (aggressive Entladung) läuft auch nachts weiter!
              Sinnvoll für Batterieschonung bei 0 PV.
            default: false
            selector:
              boolean:
        
          night_shutdown_pv_threshold:
            name: 🌙 PV-Schwelle für "Nacht"
            description: |
              Unterhalb dieser PV-Leistung gilt es als Nacht (z.B. 10 W).
              Nur relevant wenn Nachtabschaltung aktiviert ist.
            default: 10
            selector:
              number:
                min: 0
                max: 100
                unit_of_measurement: W
    
mode: queued
max_exceeded: silent

variables:
  # ===========================================
  # BLOCK 1: Variablen für Conditions & Modus-Logik
  # (Werden IMMER benötigt)
  # ===========================================
  
  # Zonen-Schwellwerte
  soc_fast_limit_int: !input soc_fast_limit
  soc_conservation_limit_int: !input soc_conservation_limit
  
  # Aktuelle Sensorwerte für Conditions
  soc: !input soc_sensor
  timeout_countdown: !input remote_timeout_countdown_sensor
  solakon_mode: !input mode_select
  cycle_active: !input cycle_active_input_select
  
  # Nachtabschaltung Config
  night_shutdown_enabled_bool: !input night_shutdown_enabled
  night_pv_threshold: !input night_shutdown_pv_threshold
  solar_power_for_night_check: !input solar_power_sensor
  
  # PI-Regler Helper
  integral_entity: !input integral_helper
  
  # Entitäten
  active_power_entity: !input active_power_number
  discharge_current_entity: !input max_discharge_current_number
  timeout_set_entity: !input remote_timeout_set_number
  
  # Parameter
  discharge_current_max: !input default_discharge_current

triggers:
  # -------------------------------------------------------------------------------------------------
  # 1. Leistungsänderungen (Ohne Verzögerung für schnelle PI-Regelung)
  # -------------------------------------------------------------------------------------------------
  - trigger: state
    entity_id: !input grid_power_sensor
    id: grid_power_change

  - trigger: state
    entity_id: !input solar_power_sensor
    id: solar_power_change

  # -------------------------------------------------------------------------------------------------
  # 2. SOC-Schwellwert-Erreichung (Steuert Zonen-Wechsel)
  # -------------------------------------------------------------------------------------------------
  - trigger: numeric_state
    entity_id: !input soc_sensor
    above: !input soc_fast_limit
    id: soc_high

  - trigger: numeric_state
    entity_id: !input soc_sensor
    below: !input soc_conservation_limit
    id: soc_low

  # -------------------------------------------------------------------------------------------------
  # 3. Modus-Wechsel (Reagiert auf manuelle/externe Änderung)
  # -------------------------------------------------------------------------------------------------
  - trigger: state
    entity_id: !input mode_select
    id: mode_change

action:
  # -------------------------------------------------------------------------------------------------
  # VALIDIERUNG: Check auf kritische Fehler (Werte und Entitäten)
  # -------------------------------------------------------------------------------------------------
  - choose:
    # PRÜFUNG A: SOC-Limits
    - conditions:
        - condition: template
          value_template: "{{ soc_fast_limit_int <= soc_conservation_limit_int }}"
      sequence:
        - service: system_log.write
          data:
            level: error
            message: "Solakon ONE Blueprint Fehler Die obere SOC-Schwelle ({{ soc_fast_limit_int }}%) muss größer sein als die untere SOC-Schwelle ({{ soc_conservation_limit_int }}%). Automatisierung gestoppt."
        - stop: Die SOC-Limits sind falsch gesetzt.
          
    # PRÜFUNG B: Kritische Entitäten verfügbar
    - conditions:
        - condition: or
          conditions:
            # SOC und Timeout-Countdown: Prüfe direkt auf 'unknown'/'unavailable'
            - condition: template
              value_template: >
                {{ is_state(soc, 'unknown') or is_state(soc, 'unavailable') or
                   is_state(timeout_countdown, 'unknown') or is_state(timeout_countdown, 'unavailable') }}
            # Grid Power: Wird später geprüft (nach Variables)
            # Modus-Selektor
            - condition: template
              value_template: "{{ is_state(solakon_mode, 'unknown') or is_state(solakon_mode, 'unavailable') }}"
            # Active Power Number
            - condition: template
              value_template: "{{ state_attr(active_power_entity, 'min') is none }}"
      sequence:
        - service: system_log.write
          data:
            level: error
            message: "Solakon ONE Blueprint Fehler Eine oder mehrere kritische Entitäten (SOC, Timeout-Sensor, Ausgangsleistungsregler) sind UNVERFÜGBAR oder haben ungültige Werte. Automatisierung gestoppt."
        - stop: Kritische Entitäten sind fehlerhaft.
          
    default:
      # -------------------------------------------------------------------------------------------------
      # HAUPT-LOGIK: Modus- und Zyklus-Steuerung (Zone 1, 2, 3)
      # -------------------------------------------------------------------------------------------------
      - choose:
          # FALL A: ZONE 1 - Aggressive Entladung START (SOC > Obere Schwelle UND Zyklus OFF)
          - conditions:
              - condition: template
                value_template: "{{ states(soc) | float(0) > soc_fast_limit_int }}"
              - condition: state
                entity_id: !input cycle_active_input_select
                state: 'off'
            sequence:
              # Logging
              - service: logbook.log
                data:
                  name: Solakon Zonenwechsel
                  message: "🔋 Zone 1 aktiviert (Aggressive Entladung) - SOC: {{ states(soc) }}%"
                  entity_id: !input soc_sensor
              # Integral zurücksetzen bei Zonenwechsel
              - service: input_number.set_value
                data:
                  entity_id: !input integral_helper
                  value: 0
              # 1. Zyklus auf 'on' setzen
              - service: input_select.select_option
                data:
                  entity_id: !input cycle_active_input_select
                  option: 'on'
              # 2. Modus-Wechsel zu 'INV Discharge PV Priority' (mit Puls-Sequenz zur Sicherheit)
              - choose:
                  - conditions: "{{ states(solakon_mode) != '1' }}"
                    sequence:
                      - service: number.set_value
                        data:
                          entity_id: !input remote_timeout_set_number
                          value: 10
                      - delay: '00:00:01' 
                      - service: number.set_value
                        data:
                          entity_id: !input remote_timeout_set_number
                          value: 3599
                      - service: select.select_option
                        data:
                          entity_id: !input mode_select
                          option: '1'
          
          # FALL B: ZONE 3 - Sicherheits-STOPP (SOC <= Untere Schwelle UND Zyklus ON)
          - conditions:
              - condition: template
                value_template: "{{ states(soc) | float(0) <= soc_conservation_limit_int }}"
              - condition: state
                entity_id: !input cycle_active_input_select
                state: 'on'
            sequence:
              # Logging
              - service: logbook.log
                data:
                  name: Solakon Zonenwechsel
                  message: "🛑 Zone 3 aktiviert (Sicherheits-Stopp) - SOC: {{ states(soc) }}%"
                  entity_id: !input soc_sensor
              # Integral zurücksetzen
              - service: input_number.set_value
                data:
                  entity_id: !input integral_helper
                  value: 0
              # 1. Zyklus auf 'off' setzen
              - service: input_select.select_option
                data:
                  entity_id: !input cycle_active_input_select
                  option: 'off'
              # 2. Modus-Wechsel zu 'Disabled'
              - choose:
                  - conditions: "{{ states(solakon_mode) != '0' }}"
                    sequence:
                      - service: select.select_option
                        data:
                          entity_id: !input mode_select
                          option: '0'
              # 3. Power Limit auf 0 W setzen (Soft Stopp)
              - service: number.set_value
                data:
                  entity_id: !input active_power_number
                  value: 0
                  
          # FALL C: ZONE 3 - Sicherheits-STOPP (Zusätzliche Absicherung, falls Zyklus bereits OFF aber Modus aktiv)
          - conditions:
              - condition: template
                value_template: "{{ states(soc) | float(0) < soc_conservation_limit_int }}"
              - condition: state
                entity_id: !input cycle_active_input_select
                state: 'off'
              - condition: template
                value_template: "{{ states(solakon_mode) != '1' }}"
            sequence:
              # Modus auf 'Disabled' setzen
              - choose:
                  - conditions: "{{ states(solakon_mode) != '0' }}"
                    sequence:
                      - service: select.select_option
                        data:
                          entity_id: !input mode_select
                          option: '0'
              # Power Limit auf 0 W setzen
              - service: number.set_value
                data:
                  entity_id: !input active_power_number
                  value: 0
                  
          # FALL D: ZONE 2 - Batterieschonend START (P-Regler aktiv, aber 0 A Entladung)
          - conditions:
              - condition: template
                value_template: "{{ states(soc) | float(0) > soc_conservation_limit_int and states(soc) | float(0) <= soc_fast_limit_int }}"
              - condition: state
                entity_id: !input cycle_active_input_select
                state: 'off'
              - condition: template
                value_template: "{{ states(solakon_mode) != '1' }}"
              # Nachtcheck: Nur starten wenn NICHT Nacht ODER Funktion deaktiviert
              - condition: template
                value_template: >
                  {{ not night_shutdown_enabled_bool or 
                     (states(solar_power_for_night_check) | float(0)) >= night_pv_threshold }}
            sequence:
              # Logging
              - service: logbook.log
                data:
                  name: Solakon Zonenwechsel
                  message: "🔋 Zone 2 aktiviert (Batterieschonend) - SOC: {{ states(soc) }}%"
                  entity_id: !input soc_sensor
              # Integral zurücksetzen bei Zonenwechsel
              - service: input_number.set_value
                data:
                  entity_id: !input integral_helper
                  value: 0
              # Modus-Wechsel zu 'INV Discharge PV Priority'
              - choose:
                  - conditions: "{{ states(solakon_mode) != '1' }}"
                    sequence:
                      - service: number.set_value
                        data:
                          entity_id: !input remote_timeout_set_number
                          value: 10
                      - delay: '00:00:01'
                      - service: number.set_value
                        data:
                          entity_id: !input remote_timeout_set_number
                          value: 3599
                      - service: select.select_option
                        data:
                          entity_id: !input mode_select
                          option: '1'
          
          - conditions:
              # Nachtabschaltung aktiviert
              - condition: template
                value_template: "{{ night_shutdown_enabled_bool }}"
              # Es ist Nacht (PV unter Schwelle)
              - condition: template
                value_template: "{{ (states(solar_power_for_night_check) | float(0)) < night_pv_threshold }}"
              # Nur in Zone 2 (cycle = off)
              - condition: state
                entity_id: !input cycle_active_input_select
                state: 'off'
              # Modus ist aktuell aktiv
              - condition: template
                value_template: "{{ states(solakon_mode) == '1' }}"
            sequence:
              # Logging
              - service: logbook.log
                data:
                  name: Solakon Nachtmodus
                  message: "🌙 Nachtabschaltung aktiviert (Zone 2) - PV: {{ states(solar_power_for_night_check) }}W"
                  entity_id: !input solar_power_sensor
              # Integral zurücksetzen
              - service: input_number.set_value
                data:
                  entity_id: !input integral_helper
                  value: 0
              # Modus auf 'Disabled' setzen
              - service: select.select_option
                data:
                  entity_id: !input mode_select
                  option: '0'
              # Power Limit auf 0 W
              - service: number.set_value
                data:
                  entity_id: !input active_power_number
                  value: 0

    # -------------------------------------------------------------------------------------------------
  # ZUSATZ: Batterie voll → Einspeisung erlauben (PI-Regler überspringen)
  # -------------------------------------------------------------------------------------------------
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states(soc) | float(0) >= 99 and states(solakon_mode) == '1' }}
        sequence:
          # Keine Batterieentladung
          - service: number.set_value
            data:
              entity_id: !input max_discharge_current_number
              value: 0

          # Volle PV-Leistung freigeben
          - service: number.set_value
            data:
              entity_id: !input active_power_number
              value: "{{ states(solar_power_sensor) | float(0) }}"

          - stop: Batterie voll – Einspeisung erlaubt
          
  # -------------------------------------------------------------------------------------------------
  # AKTION E: PI-Regler Logik, Timeout-Refresh UND Entlade-Limit-Absicherung
  # NUR ausführen wenn Modus aktiv ist UND (Zone 1 ODER Tag)!
  # -------------------------------------------------------------------------------------------------
  - condition: template
    value_template: >
      {{ states(solakon_mode) == '1'
   and states(soc) | float(0) < 99
   and (is_state(cycle_active, 'on') or 
        not night_shutdown_enabled_bool or
        (states(solar_power_for_night_check) | float(0)) >= night_pv_threshold) }}
    
  # ===========================================
  # BLOCK 2: Variablen NUR für PI-Regler
  # (Werden nur bei aktivem Modus berechnet)
  # ===========================================
  - variables:
      # Grid Power
      grid_power: !input grid_power_sensor
      grid_power_float: "{{ states(grid_power) | float(0) }}"
      
      # Solar Power
      solar_power: !input solar_power_sensor
      solar_power_float: "{{ states(solar_power) | float(0) }}"
      
      # Konfiguration
      tolerance_int: !input tolerance
      regulator_factor_float: !input regulator_factor
      ki_factor_float: !input ki_factor
      offset_1_static: !input offset_1
      offset_1_entity_id: !input offset_1_entity
      offset_2_static: !input offset_2
      offset_2_entity_id: !input offset_2_entity

      # Dynamischer Offset: Entity-Wert wenn konfiguriert, sonst statischer Fallback
      offset_1_int: >
        {% if offset_1_entity_id is string and offset_1_entity_id | length > 0 and states(offset_1_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_1_entity_id) | float(offset_1_static) }}
        {% else %}
          {{ offset_1_static }}
        {% endif %}
      offset_2_int: >
        {% if offset_2_entity_id is string and offset_2_entity_id | length > 0 and states(offset_2_entity_id) not in ['unknown', 'unavailable', 'none', ''] %}
          {{ states(offset_2_entity_id) | float(offset_2_static) }}
        {% else %}
          {{ offset_2_static }}
        {% endif %}
      max_active_power_limit_int: !input max_active_power_limit
      pv_charge_reserve_int: !input pv_charge_reserve
      
      # PI-Regler-Variablen
      current_active_power: "{{ states(active_power_entity) | float(0) }}"
        
      # Max Power Limit in Zone 2 = Max(0, PV - Reserve)
      max_zone_2_limit: >
        {% set pv_minus_reserve = solar_power_float - pv_charge_reserve_int %}
        {% if pv_minus_reserve > 0 %}
          {{ pv_minus_reserve }}
        {% else %}
          0
        {% endif %}

      # Target Offset basiert auf Zone (offset_1_int in Zone 1, offset_2_int in Zone 2)
      target_offset: >
        {% if is_state(cycle_active, 'on') %}
          {{ offset_1_int }}
        {% else %}
          {{ offset_2_int }}
        {% endif %}
      
      # Toleranzprüfung basiert auf tatsächlichem Grid-Fehler (nicht begrenzt)
      grid_error_for_tolerance: "{{ (grid_power_float - target_offset) | abs }}"
      
      # Wartezeit
      wait_time_int: !input wait_time
      
     # PI-Regler Berechnung
      # 1. Aktueller Fehler 
      error: >
        {% if is_state(cycle_active, 'on') %}
          {# ZONE 1: Min(verfügbare Kapazität, Grid) #}
          {{ [(max_active_power_limit_int - current_active_power), (grid_power_float - offset_1_int)] | min | float(0) }}
        {% else %}
          {# ZONE 2: Min(verfügbare Kapazität, Grid - Offset, PV-Kapazität) #}
          {{ [(max_active_power_limit_int - current_active_power), (grid_power_float - offset_2_int), (max_zone_2_limit - current_active_power)] | min | float(0) }}
        {% endif %}
      
      # 2. Integral mit Anti-Windup
      integral_old: "{{ states(integral_entity) | float(0) }}"
      integral_new: >
        {% set error_float = error | float(0) %}
        {% if grid_error_for_tolerance > tolerance_int %}
          {{ [[-1000, integral_old + error_float] | max, 1000] | min | float(0) }}
        {% elif integral_old | abs > 10 %}
          {{ (integral_old * 0.95) | float(0) }}
        {% else %}
          {{ integral_old | float(0) }}
        {% endif %}
      
      # 3. PI-Korrektur (P-Anteil + I-Anteil)
      power_correction_pi: >
        {% set error_float = error | float(0) %}
        {% set integral_float = integral_new | float(0) %}
        {% set p_part = error_float * regulator_factor_float %}
        {% set i_part = integral_float * ki_factor_float %}
        {{ (p_part + i_part) | float(0) }}
      
      # 4. Neuer Power-Sollwert
      new_power_unlimited: >
        {% set correction = power_correction_pi | float(0) %}
        {{ (current_active_power + correction) | float(0) }}
        
      # 5. Finale Power: Logik in einem Template zusammengefasst
      final_power_calculated: >
        {% set p_regler_power = new_power_unlimited | float(0) %}
        {% if is_state(cycle_active, 'on') %}
          {# ZONE 1: Hard Limit #}
          {{ [max_active_power_limit_int, p_regler_power] | min | float(0) }}
        {% else %}
          {# ZONE 2: Dynamisches PV-Limit #}
          {% set max_zone_2 = max_zone_2_limit | float(0) %}
          {{ [max_zone_2, p_regler_power] | min | float(0) }}
        {% endif %}
        
  - choose:
      # FALL E.1: Limit für Zone 1 setzen (Aggressiv)
      - conditions:
          - condition: state
            entity_id: !input cycle_active_input_select
            state: 'on'
          - condition: template
            value_template: >
              {# Prüfe, ob der aktuelle Wert NICHT dem Maximalwert entspricht #}
              {{ states(discharge_current_entity) | float(999) | round(2) != discharge_current_max | float(0) | round(2) }}
        sequence:
          - service: number.set_value
            data:
              entity_id: !input max_discharge_current_number
              value: "{{ discharge_current_max }}"
              
      # FALL E.2: Limit für Zone 2 setzen (Batterieschonend = 0 A)
      - conditions:
          - condition: state
            entity_id: !input cycle_active_input_select
            state: 'off'
          - condition: template
            value_template: >
              {# Prüfe, ob der aktuelle Wert NICHT 0 A entspricht #}
              {{ states(discharge_current_entity) | float(999) | round(2) != 0 }}
        sequence:
          - service: number.set_value
            data:
              entity_id: !input max_discharge_current_number
              value: 0

  # 2. Timeout-Reset
  - choose: 
        # Timeout-Reset erforderlich
      - conditions:
          - condition: template
            value_template: "{{ states(timeout_countdown) | int(9999) < 120 }}"
        sequence:
          - service: number.set_value
            data:
              entity_id: !input remote_timeout_set_number
              value: 10
          - delay: '00:00:01'
          - service: number.set_value
            data:
              entity_id: !input remote_timeout_set_number
              value: 3599
              
  # 3. Integral speichern
  - service: input_number.set_value
    data:
      entity_id: !input integral_helper
      value: "{{ integral_new }}"
      
  # 4. Power Limit setzen (Nur wenn Toleranz überschritten ist)
  - condition: template
    value_template: "{{ grid_error_for_tolerance > tolerance_int }}"
  
  - service: number.set_value
    data:
      entity_id: !input active_power_number
      value: "{{ [0, final_power_calculated] | max | round(0) }}"
  - delay:
      seconds: '{{wait_time_int}}'













